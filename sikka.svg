<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Sikka">
  <!-- Minimal geometric mark: outer ring + simple S-path + two-parent DAG nodes -->
  <circle cx="256" cy="256" r="196" fill="none" stroke="#111827" stroke-width="38"/>
  <circle cx="256" cy="256" r="162" fill="none" stroke="#e5e7eb" stroke-width="4"/>

  <!-- Flowing path (S) -->
  <path d="M318 172 c-22-13-52-16-82-6 c-30 10-48 33-48 58 c0 22 15 38 50 50 l44 15 c26 9 36 18 36 33 c0 15-14 26-34 32 c-24 7-52 1-78-18"
        fill="none" stroke="#111827" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Accent on the path -->
  <path d="M316 176 c-20-11-46-14-73-5 c-26 9-43 29-43 51 c0 18 12 31 43 41 l40 14 c23 8 31 15 31 28 c0 12-11 22-28 27"
        fill="none" stroke="#0ea5e9" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Two parent nodes + links (core invariant) -->
  <circle cx="142" cy="192" r="12" fill="#111827"/>
  <circle cx="142" cy="320" r="12" fill="#111827"/>

  <!-- Child / frontier node -->
  <circle cx="370" cy="256" r="14" fill="#0ea5e9"/>
  <circle cx="370" cy="256" r="6" fill="#fff"/>

  <!-- Parent links -->
  <line x1="154" y1="192" x2="356" y2="240" stroke="#6b7280" stroke-width="6" stroke-linecap="round"/>
  <line x1="154" y1="320" x2="356" y2="272" stroke="#6b7280" stroke-width="6" stroke-linecap="round"/>

  <!-- Small frontier dots -->
  <circle cx="400" cy="228" r="5" fill="#111827"/>
  <circle cx="400" cy="284" r="5" fill="#111827"/>
</svg>